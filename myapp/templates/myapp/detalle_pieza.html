<!DOCTYPE html>
<html>
<body>
    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
          <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="{{ pieza.Imagen.url }}" class="d-block w-100" alt="{{ pieza.titulo }}">
            
          </div>
          
          <div class="carousel-item">
            <img src="..." class="d-block w-100" alt="...">
          </div>
          <div class="carousel-item">
            <img src="..." class="d-block w-100" alt="...">
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
    <div class="card mb-3" style="max-width: 540px;">
        <div class="row g-0">
          <div class="col-md-4">
            <img src="{{ pieza.Imagen.url }}" class="img-fluid rounded-start" alt="{{ pieza.titulo }}">
          </div>
          <div class="col-md-8">
            <div class="card-body"> 
              <a href= "{% url 'actualizar_img' pieza.id %}" class="btn btn-primary">Editar Imagen</a>
              <h5 class="card-title">{{ pieza.titulo }}</h5>
              <p class="card-text">Descripción: {{ pieza.descripcion }}</p> 
              <p class="card-text"><small class="text-body-secondary">Autor: {{ pieza.autor }}</small></p>
              <p class="card-text"><small class="text-body-secondary">Tipo de pieza: {{ pieza.get_pieza_display }}</small></p>
              <p class="card-text"><small class="text-body-secondary">Fecha: {{ pieza.fecha }}</small></p>
              <a href= "{% url 'actualizar_datos' pieza.id %}" class="btn btn-primary">Editar Informacion</a>
              <br>
              <br>
              <a href="{% url 'listado_piezas' %}" class="btn btn-primary">Cancelar</a> <a href= "{% url 'eliminar_pieza' pieza.id %}" class="btn btn-primary">Eliminar Pieza</a>
            </div>
          </div>
        </div>
      </div>
      
</body>
</html>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
