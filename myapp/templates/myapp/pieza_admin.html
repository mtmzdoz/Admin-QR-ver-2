
<a class="btn btn-primary" href="{% url 'agregar' %}" role="button">Agregar elemento patrimonial</a>

{% block content %}

<table>
    <tr>
        <th>Nombre pieza</th>
        <th>Opciones</th>
        

    </tr>
    {% for e in elemento %}

    <tr>
        <td>{{ e.titulo | title }}</td>
        <td>
            <div class="btn-group">
                <a href= "{% url 'actualizar_desc' e.id %}" class="btn btn-primary">Editar Informacion</a>
                <a href= "{% url 'actualizar_img' e.id %}" class="btn btn-primary">Editar Imagen</a>
                <a href= "{% url 'eliminar_pieza' e.id %}" class="btn btn-primary">Eliminar Pieza</a>
              </div>

        </td>
    </tr>

    {% endfor %}

</table>


{% endblock %}
