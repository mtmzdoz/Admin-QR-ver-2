

<a href="{% url 'agregar' %}">Agregar elemento patrimonial</a>

{% block content %}

<table>
    <tr>
        <th>Nombre pieza</th>
        <th>Opciones</th>
        

    </tr>
    {% for e in elemento %}

    <tr>
        <td>{{ e.titulo | title }}</td>
        <td>
            <a href="{% url 'actualizar_desc' e.id %}" class="button">Editar descripcion</a>
            <a href="{% url 'actualizar_img' e.id %}">Editar imagen</a>
            <a href="{% url 'eliminar_pieza' e.id %}">Eliminar</a>
            

        </td>
    </tr>

    {% endfor %}

</table>


{% endblock %}
